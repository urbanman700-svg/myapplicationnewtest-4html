<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Chat App</title><style>body { font-family: Arial, sans-serif; }</style></head><body><h1>Chat App</h1><input id='message' type='text' placeholder='Type a message...'><button id='send'>Send</button><div id='chat-log'></div><script>const messageInput = document.getElementById('message');const sendButton = document.getElementById('send');const chatLog = document.getElementById('chat-log');sendButton.addEventListener('click', () => {const message = messageInput.value;chatLog.innerHTML += `<p>You: ${message}</p>`;messageInput.value = '';});</script></body></html>
